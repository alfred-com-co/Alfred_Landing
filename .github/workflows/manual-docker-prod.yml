name: Manual Docker Build

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker tag to publish in Artifact Registry prod
        required: false
        default: latest

jobs:
  build-and-push:
    name: Build & Push Docker Image to PROD
    environment:
      name: webprod
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: us-central1-docker.pkg.dev/api-8441211629953429073-714295/frontend/alfred-landing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log current commit
        run: |
          echo "Running on commit: $(git rev-parse HEAD)"
          git log -1 --pretty=format:'%h - %an (%ar): %s'

      - name: Verify Google credentials secret
        env:
          PROD_GOOGLE_CREDENTIALS: ${{ secrets.PROD_GOOGLE_CREDENTIALS }}
        run: |
          if [ -z "$PROD_GOOGLE_CREDENTIALS" ]; then
            echo "PROD_GOOGLE_CREDENTIALS secret is not available for this workflow run." >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.PROD_GOOGLE_CREDENTIALS }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: api-8441211629953429073-714295
          export_default_credentials: true

      - name: Configure Artifact Registry authentication
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Show gcloud auth status
        run: |
          gcloud auth list
          gcloud config list project
          gcloud artifacts repositories describe frontend \
            --location=us-central1 \
            --project=api-8441211629953429073-714295 || true

      - name: Explicit Docker login with access token
        run: |
          gcloud auth print-access-token \
            | docker login -u oauth2accesstoken --password-stdin us-central1-docker.pkg.dev

      - name: Generate Landing env file
        run: |
          cat <<'EOF' > alfred-landing/.env
          SLACK_WEBHOOK_EMPRESAS=${{ secrets.SLACK_WEBHOOK_EMPRESAS }}
          SLACK_WEBHOOK_ALIADOS=${{ secrets.SLACK_WEBHOOK_ALIADOS }}
          SLACK_WEBHOOK_CONVENIOS=${{ secrets.SLACK_WEBHOOK_CONVENIOS }}
          SLACK_WEBHOOK_NOSOTROS=${{ secrets.SLACK_WEBHOOK_NOSOTROS }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          EOF

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -f Dockerfile \
            -t $IMAGE_NAME:${{ inputs.image_tag }} \
            .

      - name: Push Docker image
        run: docker push $IMAGE_NAME:${{ inputs.image_tag }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy alfred-landing \
            --image $IMAGE_NAME:${{ inputs.image_tag }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --quiet
